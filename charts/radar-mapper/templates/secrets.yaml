{{- if include "radar-mapper.createSecret" . }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "common.names.fullname" . }}
  namespace: {{ include "common.names.namespace" . | quote }}
  labels: {{- include "common.labels.standard" (dict "customLabels" .Values.commonLabels "context" $) | nindent 4 }}
  {{- if .Values.commonAnnotations }}
  annotations: {{- include "common.tplvalues.render" (dict "value" .Values.commonAnnotations "context" $) | nindent 4 }}
  {{- end }}
type: Opaque
data:
  # Individual credential keys — provided for reference and for use with
  # external secret operators (e.g. External Secrets Operator, Sealed Secrets).
  sourceS3AccessToken: {{ .Values.source.s3.accessToken | b64enc | quote }}
  sourceS3SecretKey: {{ .Values.source.s3.secretKey | b64enc | quote }}
  destS3AccessToken: {{ .Values.destination.s3.accessToken | b64enc | quote }}
  destS3SecretKey: {{ .Values.destination.s3.secretKey | b64enc | quote }}
  mpClientSecret: {{ .Values.managementPortal.clientSecret | b64enc | quote }}
{{- end }}
