apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "common.names.fullname" . }}
  namespace: {{ include "common.names.namespace" . | quote }}
  labels: {{- include "common.labels.standard" (dict "customLabels" .Values.commonLabels "context" $) | nindent 4 }}
  {{- if .Values.commonAnnotations }}
  annotations: {{- include "common.tplvalues.render" (dict "value" .Values.commonAnnotations "context" $) | nindent 4 }}
  {{- end }}
spec:
  schedule: {{ .Values.schedule | quote }}
  concurrencyPolicy: {{ .Values.concurrencyPolicy }}
  failedJobsHistoryLimit: {{ .Values.failedJobsHistoryLimit }}
  successfulJobsHistoryLimit: {{ .Values.successfulJobsHistoryLimit }}
  startingDeadlineSeconds: {{ .Values.startingDeadlineSeconds }}
  jobTemplate:
    metadata:
      labels: {{- include "radar-mapper.selectorLabels" . | nindent 8 }}
    spec:
      backoffLimit: {{ .Values.backoffLimit }}
      template:
        metadata:
          labels: {{- include "radar-mapper.selectorLabels" . | nindent 12 }}
          annotations:
            {{- if not .Values.existingSecret }}
            checksum/configmap: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
            {{- end }}
            checksum/secret: {{ include (print $.Template.BasePath "/secrets.yaml") . | sha256sum }}
        spec:
          {{- include "radar-mapper.imagePullSecrets" . | nindent 10 }}
          restartPolicy: OnFailure
          securityContext:
            {{- toYaml .Values.podSecurityContext | nindent 12 }}
          containers:
            - name: radar-mapper
              securityContext:
                {{- toYaml .Values.securityContext | nindent 16 }}
              image: {{ include "radar-mapper.image" . }}
              imagePullPolicy: {{ .Values.image.pullPolicy | quote }}
              args:
                - /etc/radar-mapper/mapper.yml
              {{- with .Values.extraEnvVars }}
              env:
                {{- toYaml . | nindent 16 }}
              {{- end }}
              resources:
                {{- toYaml .Values.resources | nindent 16 }}
              volumeMounts:
                - name: config
                  mountPath: /etc/radar-mapper
                  readOnly: true
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: config
              {{- if .Values.existingSecret }}
              # When existingSecret is set the Secret must contain 'mapper.yml'
              # (and optionally 'event-lookup.csv') as keys.
              secret:
                secretName: {{ .Values.existingSecret }}
              {{- else }}
              configMap:
                name: {{ include "common.names.fullname" . }}
              {{- end }}
            # Writable /tmp required for temporary files during S3 uploads.
            - name: tmp
              emptyDir: {}
          {{- with .Values.nodeSelector }}
          nodeSelector:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.affinity }}
          affinity:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.tolerations }}
          tolerations:
            {{- toYaml . | nindent 12 }}
          {{- end }}
